{% extends "base.html" %}
{% block title %}Reset password{% endblock %}
{% block content %}
<div class="auth-box">
  <h1>Check your email</h1>

  <a href="{% url 'account_login' %}">Back to sign in</a>
</div>
{% endblock %}
